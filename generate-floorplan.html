<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <title>Floor Plan Generator</title>
</head>
<body>
<canvas id="c"></canvas>
<script>
// ─── 畫布設定 ────────────────────────────────────────────
const W = 2400, H = 2400
const canvas = document.getElementById('c')
canvas.width = W
canvas.height = H
const ctx = canvas.getContext('2d')

// ─── 輔助函式 ────────────────────────────────────────────
function rect(x, y, w, h, fill = null, stroke = null, lw = 1) {
  ctx.beginPath()
  ctx.rect(x, y, w, h)
  if (fill)   { ctx.fillStyle = fill;   ctx.fill()   }
  if (stroke) { ctx.strokeStyle = stroke; ctx.lineWidth = lw; ctx.stroke() }
}

function line(x1, y1, x2, y2, color = '#000', lw = 1.5) {
  ctx.beginPath()
  ctx.moveTo(x1, y1)
  ctx.lineTo(x2, y2)
  ctx.strokeStyle = color
  ctx.lineWidth = lw
  ctx.stroke()
}

function label(text, x, y, size = 10, color = '#333', align = 'center') {
  ctx.fillStyle = color
  ctx.font = `${size}px Arial`
  ctx.textAlign = align
  ctx.textBaseline = 'middle'
  ctx.fillText(text, x, y)
}

// 牆壁填充：畫斜線 hatch
function hatch(x, y, w, h, gap = 6) {
  ctx.save()
  ctx.strokeStyle = '#999'
  ctx.lineWidth = 0.5
  ctx.rect(x, y, w, h)
  ctx.clip()
  for (let i = -Math.max(w, h); i < Math.max(w, h) * 2; i += gap) {
    ctx.beginPath()
    ctx.moveTo(x + i, y)
    ctx.lineTo(x + i + h, y + h)
    ctx.stroke()
  }
  ctx.restore()
}

// 畫一個房間（包含標籤）
function room(x, y, w, h, name, fontSize = 10) {
  rect(x, y, w, h, '#fff', '#444', 1.5)
  label(name, x + w / 2, y + h / 2, fontSize, '#444')
}

// ─── 背景 ────────────────────────────────────────────────
rect(0, 0, W, H, '#f0f0f0')

// ─── 建築輪廓尺寸定義 ────────────────────────────────────
const M  = 60    // 建築外框到 canvas 邊緣的 margin
const BW = 8     // 外牆厚度
const OX = M, OY = M, OW = W - M * 2, OH = H - M * 2

// 主要 zone 邊界
const TOP_ROOMS_H  = 320  // 上方房間高度
const BOT_ROOMS_H  = 320  // 下方房間高度
const SIDE_ROOMS_W = 320  // 左右房間寬度
const CORR         = 120  // 走廊寬度

const innerX1 = OX + SIDE_ROOMS_W + CORR
const innerX2 = OX + OW - SIDE_ROOMS_W - CORR
const innerY1 = OY + TOP_ROOMS_H + CORR
const innerY2 = OY + OH - BOT_ROOMS_H - CORR
const innerW  = innerX2 - innerX1
const innerH  = innerY2 - innerY1

// ─── 整棟建築底色（白）────────────────────────────────────
rect(OX, OY, OW, OH, '#fff')

// ─── 中庭 ────────────────────────────────────────────────
rect(innerX1, innerY1, innerW, innerH, '#e8e8e8', '#666', 2)
label('中  庭', innerX1 + innerW / 2, innerY1 + innerH / 2, 28, '#aaa')

// ─── 走廊（上下左右）────────────────────────────────────
const corrTop  = OY + TOP_ROOMS_H
const corrBot  = OY + OH - BOT_ROOMS_H - CORR
const corrLeft = OX + SIDE_ROOMS_W
const corrRight= OX + OW - SIDE_ROOMS_W - CORR

// 上走廊
rect(OX + SIDE_ROOMS_W, OY + TOP_ROOMS_H, OW - SIDE_ROOMS_W * 2, CORR, '#f5f5f5', '#999', 1)
// 下走廊
rect(OX + SIDE_ROOMS_W, corrBot, OW - SIDE_ROOMS_W * 2, CORR, '#f5f5f5', '#999', 1)
// 左走廊
rect(OX + SIDE_ROOMS_W, OY + TOP_ROOMS_H, CORR, OH - TOP_ROOMS_H - BOT_ROOMS_H, '#f5f5f5', '#999', 1)
// 右走廊
rect(corrRight, OY + TOP_ROOMS_H, CORR, OH - TOP_ROOMS_H - BOT_ROOMS_H, '#f5f5f5', '#999', 1)

// ─── 上排房間 ─────────────────────────────────────────────
;(function drawTopRooms() {
  const rooms = [
    { w: 220, name: '辦公室 A1' }, { w: 160, name: '會議室' },
    { w: 200, name: '辦公室 A2' }, { w: 180, name: '辦公室 A3' },
    { w: 160, name: '儲藏室' },   { w: 200, name: '辦公室 A4' },
    { w: 220, name: '辦公室 A5' },
  ]
  const totalW = OW - SIDE_ROOMS_W * 2
  const roomsW = totalW - rooms.reduce((s, r) => s + r.w, 0)
  let cx = OX + SIDE_ROOMS_W

  rooms.forEach((r, i) => {
    const w = r.w + (i === 0 ? roomsW / rooms.length : 0)
    room(cx, OY, w, TOP_ROOMS_H, r.name, 9)
    cx += w
  })

  // 角落左上
  room(OX, OY, SIDE_ROOMS_W, TOP_ROOMS_H / 2, '接待', 9)
  room(OX, OY + TOP_ROOMS_H / 2, SIDE_ROOMS_W, TOP_ROOMS_H / 2, '等候區', 9)
  // 角落右上
  room(OX + OW - SIDE_ROOMS_W, OY, SIDE_ROOMS_W, TOP_ROOMS_H / 2, '電梯廳', 9)
  room(OX + OW - SIDE_ROOMS_W, OY + TOP_ROOMS_H / 2, SIDE_ROOMS_W, TOP_ROOMS_H / 2, '樓梯', 9)
})()

// ─── 下排房間 ─────────────────────────────────────────────
;(function drawBottomRooms() {
  const rooms = [
    { w: 200, name: '辦公室 D1' }, { w: 180, name: '辦公室 D2' },
    { w: 200, name: '印表機室' },  { w: 180, name: '辦公室 D3' },
    { w: 160, name: 'WC (女)' },  { w: 160, name: 'WC (男)' },
    { w: 200, name: '辦公室 D4' },
  ]
  const totalW = OW - SIDE_ROOMS_W * 2
  const extra = totalW - rooms.reduce((s, r) => s + r.w, 0)
  let cx = OX + SIDE_ROOMS_W
  const ry = OY + OH - BOT_ROOMS_H

  rooms.forEach((r, i) => {
    const w = r.w + (i === 0 ? extra : 0)
    room(cx, ry, w, BOT_ROOMS_H, r.name, 9)
    cx += w
  })

  room(OX, ry, SIDE_ROOMS_W, BOT_ROOMS_H / 2, '機房', 9)
  room(OX, ry + BOT_ROOMS_H / 2, SIDE_ROOMS_W, BOT_ROOMS_H / 2, '樓梯', 9)
  room(OX + OW - SIDE_ROOMS_W, ry, SIDE_ROOMS_W, BOT_ROOMS_H / 2, 'WC (無障)', 9)
  room(OX + OW - SIDE_ROOMS_W, ry + BOT_ROOMS_H / 2, SIDE_ROOMS_W, BOT_ROOMS_H / 2, '電梯廳', 9)
})()

// ─── 左排房間 ─────────────────────────────────────────────
;(function drawLeftRooms() {
  const ry = OY + TOP_ROOMS_H + CORR
  const rh = OH - TOP_ROOMS_H - BOT_ROOMS_H - CORR * 2
  const rooms = [
    { h: 220, name: '辦公室 B1' }, { h: 180, name: '辦公室 B2' },
    { h: 160, name: '會議室 B' },  { h: 220, name: '辦公室 B3' },
    { h: 180, name: '辦公室 B4' },
  ]
  const extra = rh - rooms.reduce((s, r) => s + r.h, 0)
  let cy = ry

  rooms.forEach((r, i) => {
    const h = r.h + (i === 0 ? extra : 0)
    room(OX, cy, SIDE_ROOMS_W, h, r.name, 9)
    cy += h
  })
})()

// ─── 右排房間 ─────────────────────────────────────────────
;(function drawRightRooms() {
  const rx = OX + OW - SIDE_ROOMS_W
  const ry = OY + TOP_ROOMS_H + CORR
  const rh = OH - TOP_ROOMS_H - BOT_ROOMS_H - CORR * 2
  const rooms = [
    { h: 200, name: '辦公室 C1' }, { h: 200, name: '辦公室 C2' },
    { h: 160, name: '茶水間' },    { h: 180, name: '辦公室 C3' },
    { h: 220, name: '辦公室 C4' },
  ]
  const extra = rh - rooms.reduce((s, r) => s + r.h, 0)
  let cy = ry

  rooms.forEach((r, i) => {
    const h = r.h + (i === 0 ? extra : 0)
    room(rx, cy, SIDE_ROOMS_W, h, r.name, 9)
    cy += h
  })
})()

// ─── 門（短缺口表示）────────────────────────────────────
function door(x, y, w, isHorizontal = true) {
  ctx.fillStyle = '#fff'
  if (isHorizontal) {
    ctx.fillRect(x, y - 1, w, 3)
    // 弧形
    ctx.beginPath()
    ctx.arc(x, y, w, 0, Math.PI / 2)
    ctx.strokeStyle = '#666'
    ctx.lineWidth = 1
    ctx.stroke()
  } else {
    ctx.fillRect(x - 1, y, 3, w)
    ctx.beginPath()
    ctx.arc(x, y, w, Math.PI / 2, Math.PI)
    ctx.strokeStyle = '#666'
    ctx.lineWidth = 1
    ctx.stroke()
  }
}

// 上走廊門
door(OX + SIDE_ROOMS_W + 260, corrTop, 40)
door(OX + SIDE_ROOMS_W + 560, corrTop, 40)
door(OX + SIDE_ROOMS_W + 860, corrTop, 40)

// ─── 柱子 ───────────────────────────────────────────────
function pillar(x, y, s = 24) {
  rect(x - s/2, y - s/2, s, s, '#ccc', '#666', 1.5)
  hatch(x - s/2, y - s/2, s, s, 5)
}

// 走廊角落柱
const pY1 = corrTop, pY2 = corrTop + CORR
const pX1 = corrLeft, pX2 = corrLeft + CORR
const pX3 = corrRight, pX4 = corrRight + CORR
const pYb1 = corrBot, pYb2 = corrBot + CORR

;[[pX1, pY1],[pX2, pY1],[pX3, pY1],[pX4, pY1],
  [pX1, pY2],[pX2, pY2],[pX3, pY2],[pX4, pY2],
  [pX1, pYb1],[pX2, pYb1],[pX3, pYb1],[pX4, pYb1],
  [pX1, pYb2],[pX2, pYb2],[pX3, pYb2],[pX4, pYb2],
].forEach(([px, py]) => pillar(px, py))

// 中庭柱
;[[innerX1, innerY1],[innerX2, innerY1],
  [innerX1, innerY2],[innerX2, innerY2]
].forEach(([px, py]) => pillar(px, py, 28))

// ─── 外牆（最後畫，蓋在所有房間上）────────────────────
ctx.strokeStyle = '#222'
ctx.lineWidth = BW
ctx.strokeRect(OX + BW/2, OY + BW/2, OW - BW, OH - BW)

// ─── 比例尺 ────────────────────────────────────────────
const scaleX = OX, scaleY = OY + OH + 20
ctx.fillStyle = '#333'
ctx.font = '14px Arial'
ctx.textAlign = 'left'
ctx.fillText('Scale: 1 px ≈ 0.05 m  (2400px ≈ 120m)', scaleX, scaleY + 14)

line(scaleX, scaleY + 26, scaleX + 200, scaleY + 26, '#333', 2)
line(scaleX, scaleY + 20, scaleX, scaleY + 32, '#333', 2)
line(scaleX + 200, scaleY + 20, scaleX + 200, scaleY + 32, '#333', 2)
label('10m', scaleX + 100, scaleY + 38, 12, '#333')

// ─── 標題 ────────────────────────────────────────────
label('測試平面圖 — 辦公大樓 1F', W / 2, 28, 18, '#222')

// ─── 下載 ────────────────────────────────────────────
window.addEventListener('load', () => {
  const a = document.createElement('a')
  a.download = 'test-floorplan.png'
  a.href = canvas.toDataURL('image/png')
  a.click()
})
</script>
</body>
</html>
